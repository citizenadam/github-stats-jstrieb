<svg width="360" height="210" xmlns="http://www.w3.org/2000/svg">
<style>
  svg {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
    font-size: 14px;
    line-height: 21px;
  }

  #bg {
    fill: #ffffff;
    stroke: #e1e4e8;
    stroke-width: 1px;
  }

  @media (prefers-color-scheme: dark) {
    #bg {
      fill: #0d1117;
      stroke: #30363d;
    }
  }

  foreignObject {
    width: calc(100% - 20px);
    height: calc(100% - 20px);
  }

  .card {
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    padding: 16px 20px;
    overflow: hidden;
  }

  .header {
    font-size: 16px;
    font-weight: 600;
    color: #0969da;
    margin: 0 0 12px 0;
    padding-bottom: 8px;
    border-bottom: 1px solid #d0d7de;
  }

  @media (prefers-color-scheme: dark) {
    .header {
      color: #58a6ff;
      border-bottom-color: #21262d;
    }
  }

  .progress-bar {
    display: flex;
    height: 10px;
    border-radius: 5px;
    overflow: hidden;
    background-color: #e8eaed;
    margin-bottom: 14px;
  }

  @media (prefers-color-scheme: dark) {
    .progress-bar {
      background-color: #21262d;
    }
  }

  .progress-segment {
    height: 100%;
    transition: width 0.3s ease;
    opacity: 0;
    animation: growWidth 0.6s ease-out forwards;
  }

  @keyframes growWidth {
    from { width: 0 !important; opacity: 0; }
    to { opacity: 1; }
  }

  .lang-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 16px;
  }

  .lang-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #57606a;
    opacity: 0;
    animation: fadeIn 0.3s ease-out forwards;
  }

  @media (prefers-color-scheme: dark) {
    .lang-item {
      color: #8b949e;
    }
  }

  .lang-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .lang-name {
    font-weight: 600;
    color: #1f2328;
  }

  @media (prefers-color-scheme: dark) {
    .lang-name {
      color: #e6edf3;
    }
  }

  .lang-pct {
    font-variant-numeric: tabular-nums;
    color: #6e7781;
  }

  @media (prefers-color-scheme: dark) {
    .lang-pct {
      color: #8b949e;
    }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<rect id="bg" x="0.5" y="0.5" width="359" height="209" rx="6" ry="6"/>

<foreignObject x="10" y="10" width="340" height="190">
  <div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <h2 class="header">Languages Used (By File Size)</h2>
    <div class="progress-bar">
      {{ progress }}
    </div>
    <ul class="lang-list">
      {{ lang_list }}
    </ul>
  </div>
</foreignObject>
</svg>
